name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write  # Required for npm Trusted Publishing (OIDC)

jobs:
  # Step 1: release-please creates/updates a release PR.
  # When the PR is merged, it creates a GitHub release + tag and sets release_created=true.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  # Step 2a: Canary — publish on every push except when release-please just created a release.
  canary:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate canary version
        id: canary_version
        run: |
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          CANARY_VERSION="${CURRENT_VERSION}-canary.${TIMESTAMP}.${COMMIT_SHORT}"
          echo "version=${CANARY_VERSION}" >> $GITHUB_OUTPUT
          node -e "const p=require('./package.json');p.version='${CANARY_VERSION}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Publish canary to npm
        run: npm publish --tag canary --provenance

  # Step 2b: Publish — triggered only when release-please creates a release (PR merged).
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if echo "$VERSION" | grep -qE "beta|alpha|rc"; then
            echo "Publishing ${VERSION} with --tag beta"
            npm publish --tag beta --provenance
          else
            echo "Publishing ${VERSION} as latest"
            npm publish --provenance
          fi

      - name: Verify publish
        run: |
          echo "Waiting for npm registry to propagate..."
          sleep 30
          EXPECTED_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view cap-js-log-control@${EXPECTED_VERSION} version 2>/dev/null || echo "NOT_FOUND")
          if [ "$PUBLISHED_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "ERROR: Expected version ${EXPECTED_VERSION} but found ${PUBLISHED_VERSION} on npm registry"
            exit 1
          fi
          echo "Verified: cap-js-log-control@${EXPECTED_VERSION} is live on npm"
