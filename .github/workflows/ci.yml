name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

jobs:
  # Skip CI when release-please merges (already tested in PR)
  should-run:
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event_name != 'push' ||
      (!contains(github.event.head_commit.message, 'release-please--branches--main') &&
      !startsWith(github.event.head_commit.message, 'chore(main): release')) }}
    steps:
      - run: echo "CI should run"

  test:
    needs: should-run
    timeout-minutes: 10
    name: Node v${{ matrix.node-version }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
        env:
          CI: true

  lint:
    needs: should-run
    timeout-minutes: 10
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
